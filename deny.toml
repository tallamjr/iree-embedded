# cargo-deny configuration: dependency licence and security-advisory policy.
# Run locally with `cargo deny check`.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licences compatible with this crate's MIT OR Apache-2.0 terms.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
